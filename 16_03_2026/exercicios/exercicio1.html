<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }

        /* Menu superior com fundo ciano */
        nav {
            background-color: #00FFFF; /* Cyan */
            padding: 10px;
            border: 1px solid #000;
        }

        nav ul {
            list-style-type: disc;
            margin-left: 20px;
            padding: 0;
        }

        nav a {
            color: blue;
            text-decoration: underline;
        }

        /* Títulos principais em azul */
        h1, h2 {
            color: blue;
        }

        h1 {
            font-size: 2.5em;
            margin-top: 20px;
        }

        /* Caixa inferior roxa com texto vermelho */
        .caixa-capitais {
            background-color: #8A2BE2; /* BlueViolet */
            border: 2px solid brown;
            padding: 20px;
            color: red;
            font-weight: bold;
        }

        .caixa-capitais ul {
            list-style-type: disc;
            font-size: 1.5em;
        }

        .caixa-capitais li {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="https://google.com">Google.com</a></li>
            <li><a href="https://bing.com">Bing.com</a></li>
            <li><a href="#">X</a></li>
            <li><a href="https://w3schools.com">W3Schools.com</a></li>
        </ul>
    </nav>

    <h1>Título da página</h1>
    <p>Esse é meu site, ficou bom ein!?</p>

    <h2>Capitais do Brasil</h2>

    <div class="caixa-capitais">
        <ul>
            <li>São Paulo - SP</li>
            <li>Brasília - DF</li>
            <li>Goiânia - GO</li>
            <li>Palmas - TO</li>
        </ul>
    </div>

</body>
</html>
