<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio cards</title>
    <style>
        .cards{
            list-style: none;
            display: flex;
            margin: 10px;          
        }
        .caixas{
            padding: 15px;
            margin: 10px;
        }

        .caixa1{
            background-color: bisque;
        }

        .caixa2{
            background-color: rgb(196, 255, 254);
        }

        .caixa3{
            background-color: rgb(196, 255, 232);
        }
        
        .saiba-mais{
            background-color: red;
            padding: 3px;
            border-radius: 5px;
            color: white;
            text-decoration: none;
        }
        
    </style>
</head>
<body>
    <h1>GALERIA DE CASTRO</h1>
    <p>Galeria de fotos desenvolvida para atividade da FATEC.</p>
    <div class="cards">
        <div class="caixas caixa1">
            <h3>Primeiro item</h3>
            <img src="https://embratur.com.br/wp-content/uploads/2022/07/Embratur-Brasil-ultrapassa-marca-de-1-milhao-de-turistas-estrangeiros-recebidos-pela-primeira-vez-desde-2020-1.png" 
                alt="img cristo redentor"
                height="150px">
            <p>Blog de viagens</p>
            <a href="" class="saiba-mais">Saiba mais</a>
        </div>
        <div class="caixas caixa2">
            <h3>Segundo item</h3>
            <img src="https://png.pngtree.com/thumb_back/fh260/background/20230804/pngtree-flowers-of-cosmos-beautiful-and-beautiful-purple-flowers-spring-green-field-image_13001920.jpg" 
                alt="img cristo redentor"
                height="150px">
            <p>Flores para venda</p>
            <a href="" class="saiba-mais">Saiba mais</a>
        </div>
        <div class="caixas caixa3">
            <h3>Terceiro item</h3>
            <img src="https://cptstatic.s3.amazonaws.com/imagens/enviadas/materias/materia10332/racas-de-cachorro-pug-cpt11.jpg" 
                alt="img cristo redentor"
                height="150px">
            <p>Meu cachorro para adoção</p>
            <a href="" class="saiba-mais">Saiba mais</a>
        </div>
    </div>
</body>
</html>
