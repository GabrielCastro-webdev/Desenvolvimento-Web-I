<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Todos os Inputs</title>
</head>
<body>

  <h2>Formulário Completo (GET)</h2>

  <form action="" method="GET">

    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome"><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email"><br><br>

    <label for="senha">Senha:</label>
    <input type="password" id="senha" name="senha"><br><br>

    <label for="idade">Idade:</label>
    <input type="number" id="idade" name="idade"><br><br>

    <label for="data">Data de nascimento:</label>
    <input type="date" id="data" name="data"><br><br>

    <label for="cor">Cor favorita:</label>
    <input type="color" id="cor" name="cor"><br><br>

    <label for="arquivo">Upload de arquivo:</label>
    <input type="file" id="arquivo" name="arquivo"><br><br>

    <p>Sexo:</p>
    <label>
      <input type="radio" name="sexo" value="masculino"> Masculino
    </label>
    <label>
      <input type="radio" name="sexo" value="feminino"> Feminino
    </label><br><br>

    <p>Interesses:</p>
    <label>
      <input type="checkbox" name="interesse" value="jogos"> Jogos
    </label>
    <label>
      <input type="checkbox" name="interesse" value="programacao"> Programação
    </label><br><br>

    <label for="range">Nível:</label>
    <input type="range" id="range" name="nivel" min="0" max="10"><br><br>

    <label for="url">Site:</label>
    <input type="url" id="url" name="site"><br><br>

    <label for="tel">Telefone:</label>
    <input type="tel" id="tel" name="telefone"><br><br>

    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">

  </form>

</body>
</html>
